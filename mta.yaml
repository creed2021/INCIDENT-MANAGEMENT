_schema-version: 3.3.0
ID: incident-management
description: A simple CAP project.
version: 1.0.0

modules:
  - name: incident-management-srv
    type: nodejs
    path: gen/srv
    requires:
      - name: incident-management-db
      - name: incident-management-auth
      - name: incident-management-destination-service
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    parameters:
      buildpack: nodejs_buildpack
      instances: 1
    build-parameters:
      builder: npm-ci

  - name: incident-management-db-deployer
    type: hdb
    path: gen/db
    requires:
      - name: incident-management-db
    parameters:
      buildpack: nodejs_buildpack

  - name: nsincidents
    type: html5
    path: app/incidents
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm ci
        - npm run build:cf
      supported-platforms: []

  - name: incident-management-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: incident-management-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: nsincidents
          artifacts:
            - nsincidents.zip
          target-path: resources/

  - name: incident-management-app-deployer
    type: com.sap.application.content
    path: gen
    requires:
      - name: incident-management-auth
      - name: srv-api
      - name: incident-management-repo-host
        parameters:
          content-target: true
          config:
            HTML5Runtime_enabled: true
    build-parameters:
      build-result: app/
      requires:
        - name: nsincidents
          artifacts:
            - nsincidents.zip
          target-path: app/

  - name: incident-management-destinations
    type: com.sap.application.content
    requires:
      - name: incident-management-auth
        parameters:
          service-key:
            name: incident-management-auth-key
      - name: incident-management-repo-host
        parameters:
          service-key:
            name: incident-management-html5-repo-host-key
      - name: srv-api
      - name: incident-management-destination-service
        parameters:
          content-target: true
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: incident-management-html5-repository
              ServiceInstanceName: incident-management-html5-service
              ServiceKeyName: incident-management-html5-repo-host-key
              sap.cloud.service: incidentmanagement.service
            - Name: incident-management-auth
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: incident-management-auth
              ServiceKeyName: incident-management-auth-key
              sap.cloud.service: incidentmanagement.service

resources:
  - name: incident-management-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: incident-management-auth
    type: org.cloudfoundry.managed-service
    parameters:
      config:
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509
        tenant-mode: dedicated
        xsappname: incident-management-${org}-${space}
        role-collections:
          - name: 'support (incident-management ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.support'
          - name: 'admin (incident-management ${org}-${space})'
            description: 'generated'
            role-template-references:
              - '$XSAPPNAME.admin'
      path: ./xs-security.json
      service: xsuaa
      service-plan: application

  - name: incident-management-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: incident-management-html5-service
      service-plan: app-host

  # ✅ agregado: HTML5 app-runtime
  - name: incident-management-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

  - name: incident-management-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-name: incident-management-destination-service
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            destinations:
              - Authentication: NoAuthentication
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true
                Name: srv-api
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
              - Authentication: NoAuthentication
                Name: ui5
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com
            existing_destinations_policy: update
        version: 1.0.0
    requires:
      - name: srv-api
        group: destinations
        properties:
          forwardAuthToken: true
          name: srv-api
          url: ~{srv-url}

parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production